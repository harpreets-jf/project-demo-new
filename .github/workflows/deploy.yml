name: "Bank-Payments-API-Production"

on:
  workflow_dispatch: # Manual trigger for your demo

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required for checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production # Triggers the "production" claim for JFrog
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ vars.JF_URL }}/
        with:
          oidc-provider-name: hs-gh # Must match JFrog Provider Name

      - name: Docker Build & Push
        run: |
          # The domain itself points to the 'hs-dock-demo-docker' repo
          REGISTRY="hts2-hs-dock-demo-docker.jfrog.io"
          IMAGE_NAME="bank-app"
          IMAGE_URL="$REGISTRY/$IMAGE_NAME:${{ github.run_number }}"
          
          echo "Building and Pushing to: $IMAGE_URL"
          # 1. Build
          docker build -t $IMAGE_URL .
          
          # 2. Push (JFrog CLI will handle the login to the subdomain automatically)
          jf docker push $IMAGE_URL \
            --build-name="bank-payments-api" \
            --build-number="${{ github.run_number }}"
    
            
      - name: Publish and Scam Build Info
        run: |
          # Collects env vars and git metadata for the audit trail (SBOM)
     
          jf rt build-publish "bank-payments-api" "${{ github.run_number }}"
          
          jf build-scan "bank-payments-api" "${{ github.run_number }}"

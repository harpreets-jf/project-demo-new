name: "Bank-Payments-API-Production"

on:
  workflow_dispatch: # Manual trigger for your demo

permissions:
  id-token: write # Required for OIDC
  contents: read  # Required for checkout

jobs:
  deploy:
    runs-on: ubuntu-latest
    # environment: production # Triggers the "production" claim for JFrog
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup JFrog CLI
        uses: jfrog/setup-jfrog-cli@v4
        env:
          JF_URL: https://${{ vars.JF_URL }}/
          JF_PROJECT: hs
        with:
          oidc-provider-name: hs-gh # Must match JFrog Provider Name

    
            
      - name: Publish and Scam Build Info
        run: |
          # Collects env vars and git metadata for the audit trail (SBOM)
     
          jf docker pull hts2-hs-dock-demo-docker.jfrog.io/alpine:latest --build-name="bank-payments-api" --build-number=${{ github.run_number }}
          
          #jf rt build-publish "bank-payments-api" "${{ github.run_number }}"
          #jf build-scan "bank-payments-api" "${{ github.run_number }}"
          
